name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)/Contents/Developer"
          swift --version

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache vendored llama.cpp build
        id: llama-cache-macos
        uses: actions/cache/restore@v4
        with:
          path: vendor/llama.cpp
          key: llama-cpp-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/vendor-llama.ts', 'scripts/build-llama.ts') }}

      - name: Cache Swift build
        id: swift-cache-macos
        uses: actions/cache/restore@v4
        with:
          path: |
            native/mlx/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('native/mlx/Package.resolved', 'native/mlx/Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test

      - name: Build native workers
        run: |
          bun run runtime:llama:vendor
          bun run runtime:llama:build
          bun run runtime:mlx:build

      - name: Save llama.cpp cache
        if: always() && steps.llama-cache-macos.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/llama.cpp
          key: ${{ steps.llama-cache-macos.outputs.cache-primary-key }}

      - name: Save Swift build cache
        if: always() && steps.swift-cache-macos.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            native/mlx/.build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ steps.swift-cache-macos.outputs.cache-primary-key }}

      - name: Build clap binary
        run: bun run build:binary

      - name: Package archive
        run: |
          cd dist
          tar -czf clap-${{ github.ref_name }}-darwin-arm64.tar.gz clap
          shasum -a 256 clap-${{ github.ref_name }}-darwin-arm64.tar.gz > clap-${{ github.ref_name }}-darwin-arm64.tar.gz.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/clap-${{ github.ref_name }}-darwin-arm64.tar.gz
            dist/clap-${{ github.ref_name }}-darwin-arm64.tar.gz.sha256

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache vendored llama.cpp build
        id: llama-cache-linux
        uses: actions/cache/restore@v4
        with:
          path: vendor/llama.cpp
          key: llama-cpp-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/vendor-llama.ts', 'scripts/build-llama.ts') }}

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test

      - name: Build llama worker (CPU)
        run: |
          bun run runtime:llama:vendor
          bun run runtime:llama:build

      - name: Save llama.cpp cache
        if: always() && steps.llama-cache-linux.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/llama.cpp
          key: ${{ steps.llama-cache-linux.outputs.cache-primary-key }}

      - name: Build clap binary
        run: bun run build:binary

      - name: Package archive
        run: |
          cd dist
          tar -czf clap-${{ github.ref_name }}-linux-x64.tar.gz clap
          sha256sum clap-${{ github.ref_name }}-linux-x64.tar.gz > clap-${{ github.ref_name }}-linux-x64.tar.gz.sha256

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/clap-${{ github.ref_name }}-linux-x64.tar.gz
            dist/clap-${{ github.ref_name }}-linux-x64.tar.gz.sha256

  build-linux-x64-cuda-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CUDA toolkit
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-nvcc-12-8 cuda-cudart-dev-12-8 libcublas-dev-12-8 cuda-profiler-api-12-8
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"

      - name: Cache vendored llama.cpp CUDA build
        id: llama-cache-cuda
        uses: actions/cache/restore@v4
        with:
          path: vendor/llama.cpp
          key: llama-cpp-cuda-v2-cuda12.8-sm80-86-89-90-100-120-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/vendor-llama.ts', 'scripts/build-llama.ts') }}

      - run: bun install --frozen-lockfile

      - name: Build CUDA llama worker
        env:
          CUDA_HOME: /usr/local/cuda
          CLAP_CUDA_ARCHS: "80;86;89;90;100;120"
        run: |
          bun run runtime:llama:vendor
          bun run runtime:llama:build

      - name: Save llama.cpp CUDA cache
        if: success() && steps.llama-cache-cuda.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/llama.cpp
          key: ${{ steps.llama-cache-cuda.outputs.cache-primary-key }}

      - name: Package CUDA worker archive
        run: |
          mkdir -p dist
          tar -czf dist/clap-llama-cuda-${{ github.ref_name }}-linux-x64.tar.gz -C libexec clap-llama
          cd dist
          sha256sum clap-llama-cuda-${{ github.ref_name }}-linux-x64.tar.gz > clap-llama-cuda-${{ github.ref_name }}-linux-x64.tar.gz.sha256

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/clap-llama-cuda-${{ github.ref_name }}-linux-x64.tar.gz
            dist/clap-llama-cuda-${{ github.ref_name }}-linux-x64.tar.gz.sha256
