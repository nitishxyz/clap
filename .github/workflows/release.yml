name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache vendored llama.cpp build
        uses: actions/cache@v4
        with:
          path: vendor/llama.cpp
          key: llama-cpp-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/vendor-llama.ts', 'scripts/build-llama.ts') }}

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: native/mlx/.build
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('native/mlx/Package.resolved', 'native/mlx/Package.swift') }}

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test

      - name: Build native workers
        run: |
          bun run runtime:llama:vendor
          bun run runtime:llama:build
          bun run runtime:mlx:build

      - name: Build clap binary
        run: bun run build:binary

      - name: Package archive
        run: |
          cd dist
          tar -czf clap-${{ github.ref_name }}-darwin-arm64.tar.gz clap
          shasum -a 256 clap-${{ github.ref_name }}-darwin-arm64.tar.gz > clap-${{ github.ref_name }}-darwin-arm64.tar.gz.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/clap-${{ github.ref_name }}-darwin-arm64.tar.gz
            dist/clap-${{ github.ref_name }}-darwin-arm64.tar.gz.sha256

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache vendored llama.cpp build
        uses: actions/cache@v4
        with:
          path: vendor/llama.cpp
          key: llama-cpp-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/vendor-llama.ts', 'scripts/build-llama.ts') }}

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test

      - name: Build llama worker (CPU)
        run: |
          bun run runtime:llama:vendor
          bun run runtime:llama:build

      - name: Build clap binary
        run: bun run build:binary

      - name: Package archive
        run: |
          cd dist
          tar -czf clap-${{ github.ref_name }}-linux-x64.tar.gz clap
          sha256sum clap-${{ github.ref_name }}-linux-x64.tar.gz > clap-${{ github.ref_name }}-linux-x64.tar.gz.sha256

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/clap-${{ github.ref_name }}-linux-x64.tar.gz
            dist/clap-${{ github.ref_name }}-linux-x64.tar.gz.sha256
