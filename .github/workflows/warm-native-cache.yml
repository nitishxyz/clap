name: Warm native build caches

# Caches created on main are visible to all refs, including release tags.
# This workflow pre-builds the native workers whenever the build inputs
# change so tagged release runs restore warm caches instead of compiling
# llama.cpp (and CUDA kernels) from scratch.

# Manual-only while the native workers are under active iteration; run it
# once before tagging a release so the release build restores warm caches.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: warm-native-cache
  cancel-in-progress: true

jobs:
  warm-macos-arm64:
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Select latest Xcode
        run: |
          xcode=$(printf '%s\n' /Applications/Xcode*.app | sort -V | tail -n 1)
          sudo xcode-select -s "$xcode/Contents/Developer"

      - name: Record native toolchains
        id: toolchain
        run: |
          { rustc -vV; xcodebuild -version; swift --version; cmake --version; c++ --version; } > "$RUNNER_TEMP/native-toolchains"
          echo "key=$(shasum -a 256 "$RUNNER_TEMP/native-toolchains" | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Cache Bun downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-downloads-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}
          restore-keys: |
            bun-downloads-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Cargo downloads and build objects
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/cache/target
          key: cargo-native-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.key }}-${{ hashFiles('native/cache/Cargo.lock', 'native/cache/Cargo.toml', 'native/cache/crates/**/*') }}

      - name: Restore llama.cpp cache
        id: llama-cache
        uses: actions/cache/restore@v4
        with:
          path: vendor/llama.cpp
          key: llama-build-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.key }}-${{ hashFiles('scripts/vendor-llama.ts', 'scripts/build-llama.ts', 'native/llama/**/*', 'native/cache/Cargo.lock', 'native/cache/Cargo.toml', 'native/cache/crates/**/*') }}

      - name: Cache SwiftPM downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-downloads-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('native/mlx/Package.resolved', 'native/mlx/Package.swift') }}
          restore-keys: |
            swiftpm-downloads-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Swift build objects
        uses: actions/cache@v4
        with:
          path: native/mlx/.build
          key: swiftpm-build-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.key }}-${{ hashFiles('native/mlx/Package.resolved', 'native/mlx/Package.swift', 'native/mlx/Sources/**/*', 'native/mlx/Tests/**/*', 'native/cache/include/**/*', 'native/cache/Cargo.lock', 'native/cache/Cargo.toml', 'native/cache/crates/**/*') }}

      - run: bun install --frozen-lockfile

      - name: Build native workers
        run: |
          bun run runtime:llama:vendor
          bun run runtime:llama:build
          bun run runtime:mlx:build

      - name: Save llama.cpp cache
        if: steps.llama-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/llama.cpp
          key: ${{ steps.llama-cache.outputs.cache-primary-key }}

  warm-linux-x64:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Record native toolchains
        id: toolchain
        run: |
          { rustc -vV; cmake --version; c++ --version; } > "$RUNNER_TEMP/native-toolchains"
          echo "key=$(shasum -a 256 "$RUNNER_TEMP/native-toolchains" | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Cache Bun downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-downloads-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}
          restore-keys: |
            bun-downloads-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Cargo downloads and build objects
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/cache/target
          key: cargo-native-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.key }}-${{ hashFiles('native/cache/Cargo.lock', 'native/cache/Cargo.toml', 'native/cache/crates/**/*') }}

      - name: Restore llama.cpp cache
        id: llama-cache
        uses: actions/cache/restore@v4
        with:
          path: vendor/llama.cpp
          key: llama-build-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.key }}-${{ hashFiles('scripts/vendor-llama.ts', 'scripts/build-llama.ts', 'native/llama/**/*', 'native/cache/Cargo.lock', 'native/cache/Cargo.toml', 'native/cache/crates/**/*') }}

      - run: bun install --frozen-lockfile

      - name: Build llama worker (CPU)
        run: |
          bun run runtime:llama:vendor
          bun run runtime:llama:build

      - name: Save llama.cpp cache
        if: steps.llama-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/llama.cpp
          key: ${{ steps.llama-cache.outputs.cache-primary-key }}

  warm-linux-x64-cuda:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CUDA toolkit
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-nvcc-12-8 cuda-cudart-dev-12-8 libcublas-dev-12-8 cuda-profiler-api-12-8
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"

      - name: Record CUDA native toolchains
        id: toolchain
        run: |
          { rustc -vV; cmake --version; c++ --version; /usr/local/cuda/bin/nvcc --version; } > "$RUNNER_TEMP/native-toolchains"
          echo "key=$(shasum -a 256 "$RUNNER_TEMP/native-toolchains" | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Cache Bun downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-downloads-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}
          restore-keys: |
            bun-downloads-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Cargo downloads and build objects
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/cache/target
          key: cargo-native-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.key }}-${{ hashFiles('native/cache/Cargo.lock', 'native/cache/Cargo.toml', 'native/cache/crates/**/*') }}

      - name: Restore llama.cpp CUDA cache
        id: llama-cache
        uses: actions/cache/restore@v4
        with:
          path: vendor/llama.cpp
          key: llama-build-cuda-v3-sm80-86-89-90-100-120-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.key }}-${{ hashFiles('scripts/vendor-llama.ts', 'scripts/build-llama.ts', 'native/llama/**/*', 'native/cache/Cargo.lock', 'native/cache/Cargo.toml', 'native/cache/crates/**/*') }}

      - run: bun install --frozen-lockfile

      - name: Build CUDA llama worker
        env:
          CUDA_HOME: /usr/local/cuda
          CLAP_CUDA_ARCHS: "80;86;89;90;100;120"
        run: |
          bun run runtime:llama:vendor
          bun run runtime:llama:build

      - name: Save llama.cpp CUDA cache
        if: steps.llama-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/llama.cpp
          key: ${{ steps.llama-cache.outputs.cache-primary-key }}
