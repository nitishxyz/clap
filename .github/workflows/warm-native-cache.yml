name: Warm native build caches

# Caches created on main are visible to all refs, including release tags.
# This workflow pre-builds the native workers whenever the build inputs
# change so tagged release runs restore warm caches instead of compiling
# llama.cpp (and CUDA kernels) from scratch.

on:
  push:
    branches: [main]
    paths:
      - "scripts/vendor-llama.ts"
      - "scripts/build-llama.ts"
      - "scripts/build-mlx.ts"
      - "native/**"
      - ".github/workflows/warm-native-cache.yml"
  workflow_dispatch:

concurrency:
  group: warm-native-cache
  cancel-in-progress: true

jobs:
  warm-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)/Contents/Developer"

      - name: Restore llama.cpp cache
        id: llama-cache
        uses: actions/cache/restore@v4
        with:
          path: vendor/llama.cpp
          key: llama-cpp-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/vendor-llama.ts', 'scripts/build-llama.ts') }}

      - name: Restore Swift build cache
        id: swift-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            native/mlx/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('native/mlx/Package.resolved', 'native/mlx/Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-${{ runner.arch }}-

      - run: bun install --frozen-lockfile

      - name: Build native workers
        run: |
          bun run runtime:llama:vendor
          bun run runtime:llama:build
          bun run runtime:mlx:build

      - name: Save llama.cpp cache
        if: steps.llama-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/llama.cpp
          key: ${{ steps.llama-cache.outputs.cache-primary-key }}

      - name: Save Swift build cache
        if: steps.swift-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            native/mlx/.build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ steps.swift-cache.outputs.cache-primary-key }}

  warm-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore llama.cpp cache
        id: llama-cache
        uses: actions/cache/restore@v4
        with:
          path: vendor/llama.cpp
          key: llama-cpp-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/vendor-llama.ts', 'scripts/build-llama.ts') }}

      - run: bun install --frozen-lockfile

      - name: Build llama worker (CPU)
        run: |
          bun run runtime:llama:vendor
          bun run runtime:llama:build

      - name: Save llama.cpp cache
        if: steps.llama-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/llama.cpp
          key: ${{ steps.llama-cache.outputs.cache-primary-key }}

  warm-linux-x64-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CUDA toolkit
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-nvcc-12-8 cuda-cudart-dev-12-8 libcublas-dev-12-8 cuda-profiler-api-12-8
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"

      - name: Restore llama.cpp CUDA cache
        id: llama-cache
        uses: actions/cache/restore@v4
        with:
          path: vendor/llama.cpp
          key: llama-cpp-cuda-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/vendor-llama.ts', 'scripts/build-llama.ts') }}

      - run: bun install --frozen-lockfile

      - name: Build CUDA llama worker
        env:
          CUDA_HOME: /usr/local/cuda
          CLAP_CUDA_ARCHS: "80;86;89;90;100;120"
        run: |
          bun run runtime:llama:vendor
          bun run runtime:llama:build

      - name: Save llama.cpp CUDA cache
        if: steps.llama-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: vendor/llama.cpp
          key: ${{ steps.llama-cache.outputs.cache-primary-key }}
